name: Build Dev

on:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image owner
        id: meta
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set tag suffix
        id: tag
        run: echo "suffix=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Short SHA
        id: sha
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/${{ steps.meta.outputs.owner }}/localez-backend:dev-${{ steps.tag.outputs.suffix }}
          build-args: |
            APP_VERSION=dev-${{ steps.sha.outputs.sha }}
            CHANNEL=preview
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/${{ steps.meta.outputs.owner }}/localez-frontend:dev-${{ steps.tag.outputs.suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image owner
        id: meta
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Merge backend manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ steps.meta.outputs.owner }}/localez-backend:dev \
            ghcr.io/${{ steps.meta.outputs.owner }}/localez-backend:dev-linux-amd64 \
            ghcr.io/${{ steps.meta.outputs.owner }}/localez-backend:dev-linux-arm64

      - name: Merge frontend manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ steps.meta.outputs.owner }}/localez-frontend:dev \
            ghcr.io/${{ steps.meta.outputs.owner }}/localez-frontend:dev-linux-amd64 \
            ghcr.io/${{ steps.meta.outputs.owner }}/localez-frontend:dev-linux-arm64
